# ─── RESEARCH DIRECTIONS ────────────────────────────────
# Add, remove, or reorder your research themes here.

- title: "Visual Cue Analysis & Bias"
  desc: >
    Investigating how color, texture, shape, and spatial frequency interact as cues in vision
    models. Developed causal graph methods and rank-based metrics to quantify bias—revealing
    links between architecture and human perceptual strategies.

- title: "Neural Dynamics Modelling"
  desc: >
    Applied linear state-space models to model hippocampal neural dynamics for non-spatial
    stimuli—a periodic structured framework presented at NeurIPS'24 WiML and under review
    at COSYNE'25.

- title: "Belief Dynamics in Networks"
  desc: >
    Developed a theoretical network-science framework to analyze the formation and spread
    of beliefs in online social networks, in collaboration with Prof. Mirta Galesic at the
    Santa Fe Institute.

