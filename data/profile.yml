bio:
  - >
    I am a Cognitive Science PhD student at Johns Hopkins University, working with
    <strong>Prof. Leyla Isik</strong>. I am fascinated by how intelligent systems—biological and
    artificial—learn to see and understand the world. My research sits at the intersection of
    <strong>mechanistic interpretability</strong>, <strong>visual psychophysics</strong>, and
    <strong>multimodal AI</strong>.
  - >
    My journey began with a BS-MS at IISER Bhopal in Electrical Engineering & Computer Science.
    Before JHU, I spent a year as Lab Manager at Brown's Serre Lab with Prof. Thomas Serre,
    and worked with Prof. Mirta Galesic at the Santa Fe Institute and Prof. Vineeth Balasubramanian
    at IIT Hyderabad.
  - >
    A recurring thread: I am fascinated by <strong>what features and abstractions</strong> guide
    recognition and decision-making, and how we can design AI systems more aligned with human
    perception. I aspire to pursue an academic career and become a professor.

